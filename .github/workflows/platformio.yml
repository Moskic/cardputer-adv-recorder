name: PlatformIO

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install platformio==6.1.19
      - name: Build firmware
        run: platformio run -e cardputer-adv-recorder
      - name: Run native tests
        run: platformio test -e native-tests

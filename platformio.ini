; Cardputer ADV Recorder

[platformio]
default_envs = cardputer-adv-recorder

[env:cardputer-adv-recorder]
platform = espressif32@7.0.1
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified@0.2.17
    m5stack/M5GFX@0.2.22
    z3t0/IRremote@4.7.1
    m5stack/M5Cardputer@1.1.1

[env:native-tests]
platform = native
test_framework = unity
test_build_src = true
build_src_filter =
    -<*>
    +<media/wav_format.cpp>
    +<media/file_naming.cpp>
